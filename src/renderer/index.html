<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Connector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ─── Custom Title Bar ────────────────────────────────────────── -->
  <header id="titlebar">
    <span id="titlebar-text">Claude Connector</span>
  </header>

  <!-- ─── Sidebar ──────────────────────────────────────────────── -->
  <aside id="sidebar">

    <div id="sidebar-header">
      <div id="sidebar-logo">
        <img src="../../assets/icon.png" class="logo-icon" alt="Logo">
      </div>
      <span class="sidebar-title">CC</span>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section-label">Accounts</div>

    <nav id="account-tabs">
      <!-- Account tabs rendered by renderer.js -->
    </nav>

    <button id="add-account-btn" title="Add Account (max 10)">
      <span class="add-icon">+</span>
      <span class="add-label">Add</span>
    </button>
  </aside>

  <!-- ─── Main Content: Webview Container ──────────────────────── -->
  <main id="webview-container">
    
    <!-- ── Start Page Overlay ── -->
    <div id="start-page">
      <div class="start-content">
        <img src="../../assets/icon.png" class="start-logo" alt="Claude Connector">
        <h1>Welcome to Claude Connector</h1>
        <p class="start-subtitle">Manage multiple Claude sessions seamlessly.</p>
        
        <div class="start-alert">
          <div class="alert-text">
            <strong>Important Login Note</strong>
            <p>Please log in using your <strong>Email address</strong>.</p>
          </div>
        </div>

        <button id="start-btn" class="primary-btn">
          <span>Get Started</span>
        </button>
      </div>
    </div>
    
    <!-- Webviews are created dynamically by renderer.js -->
  </main>

  <!-- ─── Right Panel: Context Vault ───────────────────────────── -->
  <aside id="vault-panel" class="hidden">
    <div class="vault-header">
      <h3>🗄️ Context Vault</h3>
      <span class="vault-badge" id="vault-count">0</span>
    </div>
    <div id="vault-drop-zone">
      <span class="drop-icon">📂</span>
      <span class="drop-text">Drop .md files here</span>
      <span class="drop-hint">or download from Claude</span>
    </div>
    <div id="vault-file-list">
      <!-- File items populated by renderer.js -->
    </div>
  </aside>

  <!-- ─── Bottom Toolbar ───────────────────────────────────────── -->
  <footer id="toolbar">

    <div id="toolbar-left">
      <div id="status-indicator" class="status-ready">
        <span id="status-dot"></span>
        <span id="status-text">Ready</span>
      </div>
    </div>

    <div id="toolbar-center">
      <button id="export-md-btn" class="toolbar-btn btn-ghost" data-tooltip="Paste a prompt into Claude to export conversation as Markdown">
        <span class="btn-icon">📝</span>
        <span class="btn-text">Export MD</span>
      </button>

      <button id="extend-btn" class="toolbar-btn btn-primary" data-tooltip="Copy conversation from this tab and paste it into the target account">
        <span class="btn-icon">🔄</span>
        <span class="btn-text">Extend Convo</span>
      </button>

      <span class="toolbar-label">TO</span>

      <select id="target-account-select">
        <!-- Options populated by renderer.js -->
      </select>
    </div>

    <div id="toolbar-right">
      <span id="account-count" class="badge">2 / 10</span>
      <button id="vault-toggle-btn" class="toolbar-btn btn-ghost" data-tooltip="Open the Context Vault to manage saved MD files">
        <span class="btn-icon">🗄️</span>
        <span class="btn-text">Vault</span>
      </button>
    </div>
  </footer>

  <!-- ─── Toast Container ─────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
